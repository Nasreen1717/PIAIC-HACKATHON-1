[pytest]
# Pytest Configuration for Module 2 - The Digital Twin
# Date: 2026-01-22
# Feature: 002-digital-twin

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test organization
markers =
    chapter-4: Chapter 4 - Gazebo Physics Simulation tests
    chapter-5: Chapter 5 - Unity Rendering tests
    chapter-6: Chapter 6 - Sensor Simulation tests
    exercise: Student exercise tests
    integration: End-to-end integration tests
    performance: Performance/benchmarking tests
    slow: Slow tests (>5 seconds)
    ros2: Tests requiring ROS 2 runtime
    gazebo: Tests requiring Gazebo simulation
    unity: Tests requiring Unity or C# validation
    smoke: Smoke tests (quick validation)

# Timeout settings (seconds per test)
timeout = 10
timeout_method = thread

# Output and reporting
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:cacheprovider

# Test paths
testpaths =
    Front-End-Book/static/examples/module-2
    Front-End-Book/docs/module-2/exercises

# Logging configuration
log_cli = false
log_cli_level = INFO
log_file = /tmp/module2-tests.log
log_file_level = DEBUG

# Coverage settings (optional, for pytest-cov)
[coverage:run]
source = Front-End-Book/static/examples/module-2
omit =
    */tests/*
    */__pycache__/*
    */venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
precision = 2
